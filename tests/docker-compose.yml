services:
  arbitrum-sepolia-fork:
    restart: 'no'
    platform: linux/amd64
    image: ghcr.io/foundry-rs/foundry:v1.0.0
    entrypoint: anvil
    command: '--host 0.0.0.0 --port 8545 --block-time 1 --fork-url $ARBITRUM_SEPOLIA_FORK_URL --fork-block-number $ARBITRUM_SEPOLIA_FORK_BLOCK --chain-id 421614'
    expose:
      - 8545
    ports:
      - 8555:8545
    healthcheck:
      # check port 8545 is open without nc
      test: (echo >/dev/tcp/$(hostname)/8545) &>/dev/null
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  unknown-chain-fork:
    restart: 'no'
    platform: linux/amd64
    image: ghcr.io/foundry-rs/foundry:v1.0.0
    entrypoint: anvil
    command: '--host 0.0.0.0 --port 8545 --block-time 1 --fork-url $ARBITRUM_SEPOLIA_FORK_URL --fork-block-number $ARBITRUM_SEPOLIA_FORK_BLOCK --chain-id 421615'
    expose:
      - 8545
    ports:
      - 8565:8545
    healthcheck:
      # check port 8545 is open without nc
      test: (echo >/dev/tcp/$(hostname)/8545) &>/dev/null
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  service-internal-error:
    image: nginx:alpine
    platform: linux/amd64
    volumes:
      - $PWD/mock/server/http500.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - 80
    ports:
      - 5500:80

  sms-arbitrum-sepolia:
    platform: linux/amd64
    image: iexechub/iexec-sms:8.7.0
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: '-Xmx256M'
      IEXEC_SMS_BLOCKCHAIN_NODE_ADDRESS: http://arbitrum-sepolia-fork:8545
      IEXEC_HUB_ADDRESS: '0xB2157BF2fAb286b2A4170E3491Ac39770111Da3E'
      IEXEC_SMS_TEE_RUNTIME_FRAMEWORK: scone
      IEXEC_SMS_IMAGE_LAS_IMAGE: 'las-image'
      IEXEC_TEE_WORKER_PRE_COMPUTE_IMAGE: 'pre-compute-image'
      IEXEC_TEE_WORKER_PRE_COMPUTE_FINGERPRINT: 'pre-compute-fingerprint'
      IEXEC_TEE_WORKER_POST_COMPUTE_IMAGE: 'post-compute-image'
      IEXEC_TEE_WORKER_POST_COMPUTE_FINGERPRINT: 'post-compute-fingerprint'
    ports:
      - 13350:13300
    healthcheck:
      test: curl -f localhost:13300/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      arbitrum-sepolia-fork:
        condition: service_healthy

  result-proxy-arbitrum-sepolia:
    platform: linux/amd64
    image: iexechub/iexec-result-proxy:7.1.0
    restart: unless-stopped
    environment:
      IEXEC_PRIVATE_CHAIN_ADDRESS: http://arbitrum-sepolia-fork:8545
      IEXEC_PUBLIC_CHAIN_ADDRESS: http://arbitrum-sepolia-fork:8545
      IEXEC_HUB_ADDRESS: '0xB2157BF2fAb286b2A4170E3491Ac39770111Da3E'
      MONGO_HOST: result-proxy-mongo
      MONGO_PORT: 13202
      IEXEC_IPFS_HOST: ipfs
    ports:
      - 13250:13200
    depends_on:
      arbitrum-sepolia-fork:
        condition: service_healthy
      result-proxy-mongo:
        condition: service_started
      ipfs:
        condition: service_healthy

  result-proxy-mongo:
    restart: unless-stopped
    image: library/mongo:4.2
    platform: linux/amd64
    entrypoint: '/bin/bash'
    command: -c "mongod --bind_ip_all --port 13202"
    expose:
      - 13202
    ports:
      - 13202:13202

  ipfs:
    restart: unless-stopped
    image: ipfs/go-ipfs:v0.9.1
    platform: linux/amd64
    expose:
      - 8080
      - 5001
    ports:
      - 8080:8080
      - 5001:5001
    healthcheck:
      test: nc -z 0.0.0.0 8080 && nc -z 0.0.0.0 5001
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  market-mongo:
    image: mongo:6.0.3
    restart: unless-stopped
    platform: linux/amd64
    expose:
      - 27017
    ports:
      - 27017:27017

  market-redis:
    image: redis:7.0.7-alpine
    platform: linux/amd64
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - 6379
    ports:
      - 6379:6379
    healthcheck:
      test: nc -z 0.0.0.0 6379
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  market-watcher-arbitrum-sepolia:
    platform: linux/amd64
    image: iexechub/iexec-market-watcher:7.0.1
    restart: unless-stopped
    environment:
      CHAIN: ARBITRUM_SEPOLIA
      START_BLOCK: $ARBITRUM_SEPOLIA_FORK_BLOCK
      CHAIN_ID: 421614
      IEXEC_ADDRESS: '0xB2157BF2fAb286b2A4170E3491Ac39770111Da3E'
      IS_NATIVE: 'false'
      ETH_WS_HOST: ws://arbitrum-sepolia-fork:8545
      ETH_RPC_HOST: http://arbitrum-sepolia-fork:8545
      MONGO_HOST: market-mongo
      REDIS_HOST: market-redis
    depends_on:
      arbitrum-sepolia-fork:
        condition: service_healthy
      market-redis:
        condition: service_healthy
      market-mongo:
        condition: service_started

  market-api-arbitrum-sepolia:
    platform: linux/amd64
    image: iexechub/iexec-market-api:7.1.2
    restart: unless-stopped
    ports:
      - 3050:3000
    expose:
      - 3000
    environment:
      CHAINS: ARBITRUM_SEPOLIA_FORK
      ARBITRUM_SEPOLIA_FORK_ETH_RPC_HOST: http://arbitrum-sepolia-fork:8545
      ARBITRUM_SEPOLIA_FORK_CHAIN_ID: 421614
      ARBITRUM_SEPOLIA_FORK_IS_NATIVE: 'false'
      ARBITRUM_SEPOLIA_FORK_IEXEC_ADDRESS: '0xB2157BF2fAb286b2A4170E3491Ac39770111Da3E'
      MONGO_HOST: market-mongo
      REDIS_HOST: market-redis
      RATE_LIMIT_MAX: 10000
      RATE_LIMIT_PERIOD: 60000
      MAX_OPEN_ORDERS_PER_WALLET: 1000
    depends_on:
      arbitrum-sepolia-fork:
        condition: service_healthy
      market-redis:
        condition: service_healthy
      market-mongo:
        condition: service_started

  compass-arbitrum-sepolia:
    platform: linux/amd64
    image: iexechub/compass:v0.1.1
    restart: unless-stopped
    environment:
      DATA_FILE_PATH: /app/data.json
    volumes:
      - $PWD/mock/compass/data.json:/app/data.json:ro
    ports:
      - 8069:3000
    healthcheck:
      test: nc -w 1 0.0.0.0 3000

  graphnode-postgres:
    image: postgres:12
    platform: linux/amd64
    restart: unless-stopped
    command:
      - 'postgres'
      - '-cshared_preload_libraries=pg_stat_statements'
    expose:
      - 5432
    environment:
      POSTGRES_USER: graphnode
      POSTGRES_PASSWORD: password
      POSTGRES_DB: graphnode-db
      POSTGRES_INITDB_ARGS: '-E UTF8 --locale=C'
    healthcheck:
      test: pg_isready -U graphnode -d graphnode-db
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  graphnode:
    platform: linux/amd64
    image: graphprotocol/graph-node:v0.34.1
    restart: unless-stopped
    expose:
      - 8000
      - 8020
    ports:
      - 8000:8000
      - 8020:8020
      - 8040:8040
    environment:
      postgres_host: graphnode-postgres
      postgres_port: 5432
      postgres_user: graphnode
      postgres_pass: password
      postgres_db: graphnode-db
      ipfs: ipfs:5001
      # Alias arbitrum-sepolia-fork as "bellecour" so the subgraph template (hardcoded network name) works
      ethereum: 'bellecour:http://arbitrum-sepolia-fork:8545'
      GRAPH_ETHEREUM_GENESIS_BLOCK_NUMBER: $ARBITRUM_SEPOLIA_FORK_BLOCK
    depends_on:
      arbitrum-sepolia-fork:
        condition: service_healthy
      graphnode-postgres:
        condition: service_healthy
      ipfs:
        condition: service_started
    healthcheck:
      test: netcat -w 1 0.0.0.0 8020
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dataprotector-subgraph-deployer:
    platform: linux/amd64
    image: iexechub/dataprotector-subgraph-deployer:3.0.0
    restart: 'no'
    depends_on:
      graphnode:
        condition: service_healthy
      ipfs:
        condition: service_started
    environment:
      ENV: prod
      START_BLOCK: $ARBITRUM_SEPOLIA_INDEX_BLOCK
      DATAPROTECTOR_ADDRESS: '0x168eAF6C33a77E3caD9db892452f51a5D91df621'
      APP_REGISTRY_ADDRESS: '0x9950D94FB074182eE93fF79a50CD698C4983281F'
      DATASET_REGISTRY_ADDRESS: '0x07cc4E1Ea30dD02796795876509a3bfC5053128d'
      GRAPHNODE_URL: http://graphnode:8020
      IPFS_URL: http://ipfs:5001

  stack-ready:
    image: bash
    platform: linux/amd64
    command:
      - echo "all services ready"
    depends_on:
      arbitrum-sepolia-fork:
        condition: service_healthy
      sms-arbitrum-sepolia:
        condition: service_healthy
      market-watcher-arbitrum-sepolia:
        condition: service_started
      market-api-arbitrum-sepolia:
        condition: service_started
      result-proxy-arbitrum-sepolia:
        condition: service_started
      compass-arbitrum-sepolia:
        condition: service_healthy
      graphnode:
        condition: service_healthy
      dataprotector-subgraph-deployer:
        condition: service_completed_successfully
      unknown-chain-fork:
        condition: service_healthy
